<!DOCTYPE html>
<html>

<head>
<title>signup</title>
<link rel="icon" href="icon/signup.png">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(179, 35, 35, 0.467);
        }

        nav {
            padding: 11px;
            border-radius:100px;
            background-color: rgb(0, 0, 0);
            overflow: hidden;
            width: auto;
        }

        nav ul {
            list-style: none;
        }

        nav li {
            display: inline-block;
            margin-right: 88px;
        }

        nav a {
            display: block;
            padding: 5px;
            text-decoration: none;
            color: white;
        }

        nav a:hover {
            background-color: red;
            color: white;
        }

        input[type=text],
        input[type=email],
        input[type=password] {
            width: 50%;
            padding: 12px 20px;
            margin: 8px 0;
            display: inline-block;
            border: 1px solid #198c5a;
            box-sizing: border-box;
        }

        button {
            background-color: #04aa28;
            color: white;
            padding: 14px 20px;
            margin: 20px 0;
            border: none;
            cursor: pointer;
            width: 11%;
            border-radius: 10px;
        }

        button:hover {
            opacity: 0.8;
        }

        .container {
            padding: 0%;
        }

    </style>
</head>

<body>
    <center>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="darkinfo.html">DarkInfo</a></li>
            </ul>
        </nav>
    </center>

    <br>

    <div class="container">
        <center>
            <h2>Signup</h2>
            <label for="uname"><b>Username</b></label>
            <input type="text" placeholder="Enter username" name="uname" required>

            <br>

            <label for="email"><b>Email</b>
                &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

            </label>
            <input type="email" placeholder="Enter email" name="email" required>

            <br>

            <label for="psw"><b>Password</b></label>
            <input type="password" placeholder="Enter password" name="psw" required>

            <br>

            <label for="psw-repeat"><b>Repeat pa</b></label>
            <input type="password" placeholder="Repeat password" name="psw-repeat" required>

            <br>

            <button type="submit">Signup</button>
        
            <a href="login.html">Login</a></center>
    </div>
</body>

</html>
