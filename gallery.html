    .navbar {
      overflow: hidden;
      background-color: #000000;
      padding: 10px 0;

    }

    /* Style the navigation bar links */
    .navbar ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: space-around;
    }

      display: block;

      text-align: center;
      padding: 14px 16px;
      text-decoration: solid;
      transition: all 0.3s ease;
    }

    /* Change color on hover */
    .navbar li a:hover {
      background-color: #99a9c093;
      color: rgb(255, 0, 0);
      transform: scale(1.1);
    }
